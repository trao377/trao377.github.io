<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trao > Portfolio</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="main-container">
    <header class="header">
      <h1 class="title">Trao</h1>
      <p class="subtitle">Découvrez mes expériences et mes compétences en développement</p>
    </header>

    <section class="search-section">
      <input type="text" id="search" placeholder="Recherchez une expérience..." class="search-input">
      <button id="search-btn" class="search-button">Rechercher</button>
    </section>

    <section id="experience" class="experience-section">
      <h2 class="section-title">Expériences</h2>
      <div id="experience-list" class="experience-list">
      </div>
    </section>

    <section id="skills" class="skills-section">
      <h2 class="section-title">Compétences</h2>
      <ul class="skills-list">
        <li class="skill-item">HTML</li>
        <li class="skill-item">CSS</li>
        <li class="skill-item">JavaScript</li>
        <li class="skill-item">React</li>
        <li class="skill-item">Node.js</li>
        <li class="skill-item">Java</li>
      </ul>
    </section>

    <footer class="footer">
      <p>&copy; 2025 : Trao Portfolio</p>
    </footer>
  </main>
  <script src="script.js"></script>
</body>
</html>
